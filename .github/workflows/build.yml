name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"
          ls -la "$ANDROID_HOME/ndk/"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x gradlew

      - name: Build Debug APK
        env:
          DIAG_PAT: ${{ secrets.DIAG_PAT }}
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/wiki-llm-${{ github.run_number }}-debug.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-llm-debug-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Create Release with APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            Автоматическая сборка из коммита ${{ github.sha }}.
            
            Скачайте `wiki-llm-${{ github.run_number }}-debug.apk` и установите на телефон.
            При первой установке Android попросит разрешить установку из неизвестных источников.
          files: artifacts/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
